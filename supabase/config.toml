# ── Edge Functions ───────────────────────────────────────────────────────────
# System (cron) + webhook functions are invoked WITHOUT a Supabase user JWT
# (pg_net / Whapi), so verify_jwt = false. The webhook verifies its own shared
# secret; cron functions are only reachable with the service-role bearer.
[functions.sync-bookings]
verify_jwt = false
[functions.confirm-reminder]
verify_jwt = false
[functions.offer-tier-1]
verify_jwt = false
[functions.remind-nonresponders]
verify_jwt = false
[functions.escalate-tier-2]
verify_jwt = false
[functions.escalate-tier-3]
verify_jwt = false
[functions.pre-shift-reminder]
verify_jwt = false
[functions.cancellation-followup]
verify_jwt = false
[functions.whatsapp-inbound]
verify_jwt = false
[functions.health-check]
verify_jwt = false
[functions.wipeover-notify]
verify_jwt = false
# Public one-click confirm link from the confirmation email — secured by its own
# HMAC token (CONFIRM_LINK_SECRET), so no user JWT.
[functions.confirm-shift-email]
verify_jwt = false
# Public Google OAuth redirect target — Google sends the browser here with no
# Supabase JWT; secured by the signed `state` param (CONFIRM_LINK_SECRET).
[functions.google-oauth-callback]
verify_jwt = false
# Auth "Send Email" hook — called server-side by Supabase Auth with no user JWT;
# secured by its Standard Webhooks signature (SEND_EMAIL_HOOK_SECRET).
[functions.send-auth-email]
verify_jwt = false

# App-facing functions are called by the frontend WITH the user's JWT; they
# verify the caller's role internally. Keep verify_jwt = true.
[functions.confirm-shifts]
verify_jwt = true
[functions.manual-assign]
verify_jwt = true
[functions.confirm-cancellation]
verify_jwt = true
[functions.provision-user]
verify_jwt = true
[functions.update-shift]
verify_jwt = true
[functions.set-user-role]
verify_jwt = true
[functions.update-cleaner]
verify_jwt = true
[functions.google-oauth-start]
verify_jwt = true
[functions.get-connection-status]
verify_jwt = true
